<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0f;
    color: #f0f0f0;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    background: #13131a;
    border-bottom: 1px solid #2a2a3a;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: #9ce656;
    text-decoration: none;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 24px;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    color: #6b6b80;
    text-decoration: none;
    font-size: 13px;
    text-transform: uppercase;
  }

  .filters {
    padding: 16px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid #2a2a3a;
    color: #6b6b80;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }

  .filter-btn.active {
    background: #9ce656;
    color: #0a0a0f;
    border-color: #9ce656;
  }

  .season-section {
    padding: 16px 24px;
  }

  .season-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: #6b6b80;
    margin-bottom: 12px;
  }

  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 12px;
    /* allow children to overflow their grid cell */
    overflow: visible;
  }

  .event-card {
    background: #13131a;
    border: 1px solid #2a2a3a;
    padding: 16px;
    /* let the table spill beyond card width */
    overflow: visible;
    /* give the card a stable width so the grid column doesn't collapse */
    min-width: 0;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .sport-tag {
    background: #9ce656;
    color: #0a0a0f;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .status-badge {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .status-played   { color: #6b6b80; border-color: #2a2a3a; }
  .status-live     { color: #ff4757; border-color: #ff4757; }
  .status-scheduled{ color: #47aaff; border-color: #47aaff; }
  .status-cancelled{ color: #6b6b80; border-color: #2a2a3a; text-decoration: line-through; }

  /* table wrapper lets it scroll horizontally without clipping */
  .table-scroll {
    overflow-x: auto;
    margin-top: 8px;
    padding-bottom: 8px;
  }

  table {
    /* table is as wide as its content needs, never squeezed */
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #2a2a3a;
    padding: 5px 8px;
    font-size: 12px;
    text-align: left;
    white-space: nowrap;
  }

  th {
    background: #1a1a25;
    color: #9ce656;
  }

  .results-block {
    margin-top: 10px;
  }

  .results-block p {
    margin: 2px 0;
    font-size: 13px;
  }

  footer {
    padding: 24px;
    text-align: center;
    border-top: 1px solid #2a2a3a;
    font-size: 12px;
    color: #6b6b80;
    margin-top: 24px;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Sports Calendar</a>
  <ul class="nav-links">
    <li><a href="#">Events</a></li>
    <li><a href="#">Competitions</a></li>
    <li><a href="#">Teams</a></li>
    <li><a href="#">Athletes</a></li>
  </ul>
</nav>

<section class="hero" style="padding:24px 24px 8px;">
  <h1 style="font-family:'Bebas Neue'; font-size:36px; margin:0 0 4px;">Sports Events</h1>
  <p style="margin:0; color:#6b6b80;">All competitions, matches, and results in one place.</p>
</section>

<div class="filters">
  <button class="filter-btn active" onclick="filterEvents('all', this)">All</button>
  <button class="filter-btn" onclick="filterEvents('scheduled', this)">Upcoming</button>
  <button class="filter-btn" onclick="filterEvents('live', this)">Live</button>
  <button class="filter-btn" onclick="filterEvents('played', this)">Played</button>
  <button class="filter-btn" onclick="filterEvents('cancelled', this)">Cancelled</button>
</div>

<main class="events-container">
  <div id="events-root"></div>
</main>

<footer>Sports Calendar</footer>

<script>
const API = 'http://localhost:8000';
let allEvents = [];

async function fetchEvents() {
  const root = document.getElementById('events-root');
  root.innerHTML = `<p style="padding:24px; color:#6b6b80;">Loading events…</p>`;
  try {
    const res = await fetch(`${API}/events/`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allEvents = await res.json();
    renderEvents(allEvents);
  } catch (e) {
    root.innerHTML = `<p style="padding:24px; color:#ff4757;">Error loading events: ${e.message}</p>`;
  }
}

function filterEvents(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allEvents : allEvents.filter(e => e.status === status);
  renderEvents(filtered);
}

function renderEvents(events) {
  const root = document.getElementById('events-root');
  if (!events.length) {
    root.innerHTML = `<p style="padding:24px; color:#6b6b80;">No events found.</p>`;
    return;
  }

  const seasons = {};
  events.forEach(e => {
    const season = e.season || 'Unknown';
    if (!seasons[season]) seasons[season] = [];
    seasons[season].push(e);
  });

  let html = '';
  Object.keys(seasons).sort((a, b) => b - a).forEach(season => {
    html += `<div class="season-section">
               <div class="season-title">Season ${season}</div>
               <div class="events-grid">`;

    seasons[season].forEach(e => {
      const sport       = e.competition?.sport_type || 'Sport';
      const status      = e.status || 'unknown';
      const competition = e.competition?.name || 'Competition';
      const dateTime    = e.date_venue ? `${e.date_venue} ${e.time_venue_utc || ''}`.trim() : '—';
      const venue       = e.venue
        ? `${e.venue.name}, ${e.venue.city}, ${e.venue.country?.name || ''}`
        : '—';

      // participants rows
      let participantRows = '';
      (e.participants || []).forEach(p => {
        const role    = p.role?.toUpperCase() || '—';
        const name    = p.entity?.official_name || '—';
        const country = p.entity?.country?.name || '—';
        const score   = p.score?.length
          ? p.score.map(s => `${s.score_value} ${s.score_label}`).join(', ')
          : '—';
        const incidents = p.incidents?.length
          ? p.incidents.map(i => {
              const who    = i.entity?.name ? ` by ${i.entity.name}` : '';
              const min    = i.minute != null ? ` at ${i.minute}'` : '';
              return `${i.incident_type.toUpperCase()}${who}${min}`;
            }).join('; ')
          : '—';

        participantRows += `<tr>
          <td>${role}</td>
          <td>${name}</td>
          <td>${country}</td>
          <td>${score}</td>
          <td>${incidents}</td>
        </tr>`;
      });

      if (!participantRows) {
        participantRows = `<tr><td colspan="5" style="color:#6b6b80;">—</td></tr>`;
      }

      // results rows
      let resultsHtml = '';
      if (e.results?.length) {
        e.results.forEach(r => {
          const winner  = r.entity?.official_name || '—';
          const message = r.message || '—';
          resultsHtml += `<p>${r.outcome_type?.toUpperCase() || '—'}: ${winner} — ${message}</p>`;
        });
      } else {
        resultsHtml = `<p style="color:#6b6b80;">—</p>`;
      }

      html += `<div class="event-card">
        <div class="card-tags">
          <span class="sport-tag">${sport}</span>
          <span class="status-badge status-${status}">${status}</span>
        </div>

        <p style="margin:4px 0;"><strong>Competition:</strong> ${competition}</p>
        <p style="margin:4px 0;"><strong>Date &amp; Time:</strong> ${dateTime}</p>
        <p style="margin:4px 0;"><strong>Venue:</strong> ${venue}</p>

        <p style="margin:10px 0 4px;"><strong>Participants:</strong></p>
        <div class="table-scroll">
          <table>
            <tr><th>Role</th><th>Name</th><th>Country</th><th>Score</th><th>Incidents</th></tr>
            ${participantRows}
          </table>
        </div>

        <div class="results-block">
          <p style="margin:0 0 4px;"><strong>Results:</strong></p>
          ${resultsHtml}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  root.innerHTML = html;
}

fetchEvents();
</script>
</body>
</html>
